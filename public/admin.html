<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prana Admin — Bookings & Feedbacks</title>
<link rel="icon" href="logo.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --green-900:#073B42;
  --green-700:#0B5C66;
  --green-600:#117685;
  --green-50:#EFF8F9;
  --line:#DCEAEC;
  --gold:#C9A24A;
  --ink:#0E2A2E;
  --slate:#4D6A6E;
  --white:#fff;
  --danger:#b0563f;
  --ok:#117685;
  --shadow:0 18px 45px -24px rgba(7,59,66,.35);
  --font-head:"Lora",Georgia,serif;
  --font-body:"Nunito Sans",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  font-family:var(--font-body);
  color:var(--ink);
  background:
    radial-gradient(80% 50% at 5% 0%, rgba(17,118,133,.14), transparent 60%),
    radial-gradient(70% 45% at 95% 15%, rgba(201,162,74,.12), transparent 62%),
    #F5FAFA;
}
a{color:inherit;text-decoration:none;}
.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
.top__inner{max-width:1180px;margin:0 auto;padding:1rem clamp(1rem,4vw,2.2rem);display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.brand{display:flex;align-items:center;gap:.75rem;}
.logo{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--green-50);color:var(--green-700);border:1px solid var(--line);}
.logo svg{width:22px;height:22px;}
.brand strong{display:block;font-family:var(--font-head);font-size:1.08rem;color:var(--green-700);line-height:1.1;}
.brand span span{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-weight:800;}
.actions{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;}
.btn{border:0;border-radius:10px;padding:.78rem 1rem;display:inline-flex;align-items:center;justify-content:center;gap:.45rem;font-weight:800;font-size:.92rem;cursor:pointer;transition:.2s ease;font-family:var(--font-body);}
.btn svg{width:18px;height:18px;}
.btn-primary{background:var(--green-700);color:#fff;box-shadow:0 12px 24px -16px rgba(11,92,102,.9);}
.btn-primary:hover{background:var(--green-900);transform:translateY(-1px);}
.btn-soft{background:var(--green-50);color:var(--green-700);border:1px solid var(--line);}
.btn-soft:hover{border-color:var(--green-600);}
.btn-danger{background:#fff5f1;color:var(--danger);border:1px solid #efc8ba;}
.btn-danger:hover{background:#ffebe3;}
main{max-width:1180px;margin:0 auto;padding:clamp(1.2rem,4vw,2.5rem);}
.hero{display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:end;margin-bottom:1.2rem;}
h1{font-family:var(--font-head);font-size:clamp(1.8rem,4vw,2.6rem);color:var(--green-900);margin-bottom:.4rem;}
.lede{color:var(--slate);font-size:1rem;max-width:58ch;line-height:1.6;}
.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;}
.login{max-width:460px;margin:3rem auto;padding:1.4rem;}
.login h2{font-family:var(--font-head);color:var(--green-700);margin-bottom:.4rem;}
.login p{color:var(--slate);line-height:1.55;margin-bottom:1rem;}
.field{display:block;margin-bottom:1rem;}
.field span{display:block;font-weight:800;font-size:.88rem;margin-bottom:.35rem;}
input{width:100%;padding:.85rem .95rem;border:1.5px solid var(--line);border-radius:10px;font-family:var(--font-body);font-size:1rem;outline:none;background:#fff;color:var(--ink);}
input:focus{border-color:var(--green-600);box-shadow:0 0 0 3px rgba(17,118,133,.12);}
.note{min-height:1.35em;font-weight:800;font-size:.92rem;margin:.75rem 0;color:var(--slate);}
.note.err{color:var(--danger);}.note.ok{color:var(--ok);}
.tabs{display:flex;gap:.65rem;flex-wrap:wrap;margin-bottom:1rem;}
.tab{border:1px solid var(--line);background:#fff;color:var(--green-700);border-radius:999px;padding:.75rem 1rem;font-weight:900;cursor:pointer;}
.tab.active{background:var(--green-700);color:#fff;border-color:var(--green-700);}
.toolbar{padding:1rem;display:flex;align-items:end;justify-content:space-between;gap:1rem;flex-wrap:wrap;border-bottom:1px solid var(--line);}
.toolbar .field{margin:0;min-width:min(260px,100%);}
.stats{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;}
.pill{display:inline-flex;align-items:center;gap:.35rem;border-radius:999px;padding:.5rem .75rem;background:var(--green-50);color:var(--green-700);font-weight:800;font-size:.88rem;border:1px solid var(--line);}
.table-wrap{overflow:auto;}
table{width:100%;border-collapse:collapse;min-width:850px;}
th,td{text-align:left;padding:.9rem 1rem;border-bottom:1px solid var(--line);vertical-align:top;}
th{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--green-700);background:#FAFEFE;position:sticky;top:0;z-index:1;}
td{font-size:.94rem;color:var(--ink);}
.time{font-weight:900;color:var(--green-700);white-space:nowrap;}
.msg{max-width:320px;color:var(--slate);line-height:1.45;}
.stars{color:var(--gold);font-weight:900;white-space:nowrap;}
.empty{text-align:center;padding:3rem 1rem;color:var(--slate);}
.hidden{display:none!important;}
@media(max-width:700px){
  .top__inner,.hero{display:flex;flex-direction:column;align-items:flex-start;}
  .actions{width:100%;}.actions .btn{flex:1;}
  .toolbar{align-items:stretch;}.toolbar .btn{width:100%;}.toolbar .field{width:100%;}
  .tabs{width:100%;}.tab{flex:1;}
}
</style>
</head>
<body>
<header class="top">
  <div class="top__inner">
    <a class="brand" href="index.html" aria-label="Back to Prana Homeo Care">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-6-4.35-6-10a6 6 0 0 1 12 0c0 5.65-6 10-6 10z"/><circle cx="12" cy="11" r="2.5"/></svg></span>
      <span><strong>Prana Admin</strong><span>Bookings & Feedbacks</span></span>
    </a>
    <div class="actions">
      <a class="btn btn-soft" href="index.html">Back to Website</a>
      <button class="btn btn-danger hidden" id="logoutBtn" type="button">Logout</button>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div>
      <h1>Admin Dashboard</h1>
      <p class="lede">Admin-only page for Dr. Srinivas to check booked timings and review patient feedbacks.</p>
    </div>
  </section>

  <section class="card login" id="loginCard">
    <h2>Admin Login</h2>
    <p>Enter the admin password.</p>
    <label class="field"><span>Admin Password</span>
      <input type="password" id="tokenInput" placeholder="Enter admin password" autocomplete="current-password" />
    </label>
    <button class="btn btn-primary" id="loginBtn" type="button" style="width:100%;">Open Admin Page</button>
    <p class="note" id="loginNote"></p>
  </section>

  <section class="hidden" id="dashboard">
    <div class="tabs">
      <button class="tab active" type="button" data-panel="bookingsPanel">Booked Timings</button>
      <button class="tab" type="button" data-panel="feedbacksPanel">Feedbacks</button>
    </div>

    <section class="card" id="bookingsPanel">
      <div class="toolbar">
        <label class="field"><span>Filter by appointment date</span>
          <input type="date" id="dateFilter" />
        </label>
        <div class="actions">
          <button class="btn btn-soft" id="todayBtn" type="button">Today</button>
          <button class="btn btn-soft" id="clearBtn" type="button">All Dates</button>
          <button class="btn btn-primary" id="downloadBtn" type="button">Download Excel CSV</button>
        </div>
        <div class="stats"><span class="pill" id="countPill">0 bookings</span></div>
      </div>
      <p class="note" id="adminNote" style="padding:0 1rem;"></p>
      <div class="table-wrap" id="tableWrap"></div>
    </section>

    <section class="card hidden" id="feedbacksPanel">
      <div class="toolbar">
        <div class="stats">
          <span class="pill" id="feedbackCountPill">0 feedbacks</span>
          <span class="pill" id="feedbackLikesPill">0 likes</span>
        </div>
        <div class="actions">
          <button class="btn btn-soft" id="refreshFeedbacksBtn" type="button">Refresh</button>
          <button class="btn btn-primary" id="downloadFeedbacksBtn" type="button">Download Feedback CSV</button>
        </div>
      </div>
      <p class="note" id="feedbackNote" style="padding:0 1rem;"></p>
      <div class="table-wrap" id="feedbackTableWrap"></div>
    </section>
  </section>
</main>

<script>
(function(){
  /* If admin.html is served from backend, keep this blank.
     If hosted with frontend, paste Railway URL here. */
  var BOOKING_API = 'https://prana-backend-production.up.railway.app';

  if(!BOOKING_API){
    if(location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1'){
      BOOKING_API = 'http://localhost:3000';
    }else{
      BOOKING_API = location.origin;
    }
  }

  var loginCard = document.getElementById('loginCard');
  var dashboard = document.getElementById('dashboard');
  var tokenInput = document.getElementById('tokenInput');
  var loginBtn = document.getElementById('loginBtn');
  var logoutBtn = document.getElementById('logoutBtn');
  var loginNote = document.getElementById('loginNote');

  var adminNote = document.getElementById('adminNote');
  var tableWrap = document.getElementById('tableWrap');
  var dateFilter = document.getElementById('dateFilter');
  var todayBtn = document.getElementById('todayBtn');
  var clearBtn = document.getElementById('clearBtn');
  var downloadBtn = document.getElementById('downloadBtn');
  var countPill = document.getElementById('countPill');

  var feedbackNote = document.getElementById('feedbackNote');
  var feedbackTableWrap = document.getElementById('feedbackTableWrap');
  var feedbackCountPill = document.getElementById('feedbackCountPill');
  var feedbackLikesPill = document.getElementById('feedbackLikesPill');
  var refreshFeedbacksBtn = document.getElementById('refreshFeedbacksBtn');
  var downloadFeedbacksBtn = document.getElementById('downloadFeedbacksBtn');

  function api(path){ return BOOKING_API.replace(/\/$/, '') + path; }
  function clean(v){ return (v || '').toString().trim(); }
  function token(){ return sessionStorage.getItem('PRANA_ADMIN_TOKEN') || ''; }
  function setToken(v){ sessionStorage.setItem('PRANA_ADMIN_TOKEN', v); }
  function clearToken(){ sessionStorage.removeItem('PRANA_ADMIN_TOKEN'); }
  function today(){ var d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10); }
  function note(el, type, message){ el.className = 'note ' + (type || ''); el.textContent = message || ''; }
  function showAdmin(){ loginCard.classList.add('hidden'); dashboard.classList.remove('hidden'); logoutBtn.classList.remove('hidden'); }
  function showLogin(){ loginCard.classList.remove('hidden'); dashboard.classList.add('hidden'); logoutBtn.classList.add('hidden'); }
  function escapeHtml(v){
    return clean(v).replace(/[&<>\"]/g, function(ch){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[ch]); });
  }
  function formatDate(yyyyMmDd){
    if(!yyyyMmDd) return '';
    var parts = yyyyMmDd.split('-');
    if(parts.length !== 3) return yyyyMmDd;
    var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    return d.toLocaleDateString('en-IN', {weekday:'short', day:'2-digit', month:'short', year:'numeric'});
  }
  function formatDateTime(value){
    if(!value) return '';
    var d = new Date(value);
    if(isNaN(d)) return value;
    return d.toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'});
  }
  function stars(n){
    n = Number(n) || 0;
    return '★★★★★'.slice(0,n) + '☆☆☆☆☆'.slice(0,5-n);
  }
  function authHeaders(){ return { 'x-admin-token': token() }; }

  function handleUnauthorized(res){
    if(res.status === 401){
      clearToken(); showLogin(); note(loginNote, 'err', 'Wrong admin password/token. Try again.'); return true;
    }
    return false;
  }

  async function loadBookings(){
    var adminToken = token();
    if(!adminToken){ showLogin(); return; }
    showAdmin();
    note(adminNote, '', 'Loading bookings...');
    tableWrap.innerHTML = '';
    var date = clean(dateFilter.value);
    var url = api('/api/admin/bookings' + (date ? '?date=' + encodeURIComponent(date) : ''));

    try{
      var res = await fetch(url, { headers: authHeaders() });
      var payload = await res.json().catch(function(){ return {}; });
      if(handleUnauthorized(res)) return;
      if(!res.ok) throw new Error(payload.error || 'Could not load bookings.');
      renderBookings(payload.bookings || []);
      note(adminNote, 'ok', 'Bookings loaded successfully.');
    }catch(err){
      note(adminNote, 'err', err.message || 'Could not connect to booking server.');
    }
  }

  function renderBookings(bookings){
    countPill.textContent = bookings.length + (bookings.length === 1 ? ' booking' : ' bookings');
    if(!bookings.length){
      tableWrap.innerHTML = '<div class="empty">No booked timings found for this filter.</div>';
      return;
    }
    var rows = bookings.map(function(b){
      return '<tr>' +
        '<td>' + escapeHtml(formatDateTime(b.created_at)) + '</td>' +
        '<td>' + escapeHtml(formatDate(b.date)) + '</td>' +
        '<td class="time">' + escapeHtml(b.time_label || b.time) + '</td>' +
        '<td><b>' + escapeHtml(b.name) + '</b></td>' +
        '<td><a href="tel:' + escapeHtml(b.phone) + '">' + escapeHtml(b.phone) + '</a></td>' +
        '<td>' + escapeHtml(b.concern || '-') + '</td>' +
        '<td class="msg">' + escapeHtml(b.message || '-') + '</td>' +
      '</tr>';
    }).join('');
    tableWrap.innerHTML = '<table><thead><tr>' +
      '<th>Booked At</th><th>Date</th><th>Session</th><th>Name</th><th>Phone</th><th>Concern</th><th>Message</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';
  }

  async function loadFeedbacks(){
    var adminToken = token();
    if(!adminToken){ showLogin(); return; }
    showAdmin();
    note(feedbackNote, '', 'Loading feedbacks...');
    feedbackTableWrap.innerHTML = '';

    try{
      var res = await fetch(api('/api/admin/feedbacks'), { headers: authHeaders() });
      var payload = await res.json().catch(function(){ return {}; });
      if(handleUnauthorized(res)) return;
      if(!res.ok) throw new Error(payload.error || 'Could not load feedbacks.');
      renderFeedbacks(payload.feedbacks || []);
      note(feedbackNote, 'ok', 'Feedbacks loaded successfully.');
    }catch(err){
      note(feedbackNote, 'err', err.message || 'Could not connect to feedback server.');
    }
  }

  function renderFeedbacks(feedbacks){
    var totalLikes = feedbacks.reduce(function(sum, item){ return sum + (Number(item.likes) || 0); }, 0);
    feedbackCountPill.textContent = feedbacks.length + (feedbacks.length === 1 ? ' feedback' : ' feedbacks');
    feedbackLikesPill.textContent = totalLikes + (totalLikes === 1 ? ' like' : ' likes');

    if(!feedbacks.length){
      feedbackTableWrap.innerHTML = '<div class="empty">No feedbacks found yet.</div>';
      return;
    }

    var rows = feedbacks.map(function(f){
      return '<tr>' +
        '<td>' + escapeHtml(formatDateTime(f.created_at)) + '</td>' +
        '<td><b>' + escapeHtml(f.name || 'Anonymous') + '</b></td>' +
        '<td class="stars" title="' + escapeHtml(f.rating) + ' stars">' + escapeHtml(stars(f.rating)) + '</td>' +
        '<td class="msg">' + escapeHtml(f.message || '-') + '</td>' +
        '<td><b>' + escapeHtml(f.likes || 0) + '</b></td>' +
        '<td><button class="btn btn-danger" type="button" data-delete-feedback="' + escapeHtml(f.id) + '">Delete</button></td>' +
      '</tr>';
    }).join('');

    feedbackTableWrap.innerHTML = '<table><thead><tr>' +
      '<th>Submitted</th><th>Name</th><th>Rating</th><th>Feedback</th><th>Likes</th><th>Action</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';
  }

  function downloadCsv(){
    if(!token()){ showLogin(); return; }
    var date = clean(dateFilter.value);
    var qs = '?token=' + encodeURIComponent(token()) + (date ? '&date=' + encodeURIComponent(date) : '');
    window.location.href = api('/api/admin/bookings.csv' + qs);
  }

  function downloadFeedbacksCsv(){
    if(!token()){ showLogin(); return; }
    window.location.href = api('/api/admin/feedbacks.csv?token=' + encodeURIComponent(token()));
  }

  loginBtn.addEventListener('click', function(){
    var v = clean(tokenInput.value);
    if(!v) return note(loginNote, 'err', 'Please enter admin password/token.');
    setToken(v);
    note(loginNote, '', '');
    dateFilter.value = today();
    loadBookings();
    loadFeedbacks();
  });

  tokenInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') loginBtn.click(); });

  logoutBtn.addEventListener('click', function(){
    clearToken(); tokenInput.value = ''; showLogin(); note(loginNote, '', 'Logged out.');
  });

  document.querySelectorAll('.tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
      document.querySelectorAll('#dashboard > .card').forEach(function(panel){ panel.classList.add('hidden'); });
      tab.classList.add('active');
      document.getElementById(tab.getAttribute('data-panel')).classList.remove('hidden');
    });
  });

  dateFilter.addEventListener('change', loadBookings);
  todayBtn.addEventListener('click', function(){ dateFilter.value = today(); loadBookings(); });
  clearBtn.addEventListener('click', function(){ dateFilter.value = ''; loadBookings(); });
  downloadBtn.addEventListener('click', downloadCsv);
  refreshFeedbacksBtn.addEventListener('click', loadFeedbacks);
  downloadFeedbacksBtn.addEventListener('click', downloadFeedbacksCsv);

  feedbackTableWrap.addEventListener('click', async function(e){
    var btn = e.target.closest('[data-delete-feedback]');
    if(!btn) return;
    var id = btn.getAttribute('data-delete-feedback');
    if(!confirm('Delete this feedback from the website?')) return;

    try{
      btn.disabled = true;
      var res = await fetch(api('/api/admin/feedbacks/' + encodeURIComponent(id)), {
        method:'DELETE',
        headers: authHeaders()
      });
      var payload = await res.json().catch(function(){ return {}; });
      if(handleUnauthorized(res)) return;
      if(!res.ok) throw new Error(payload.error || 'Could not delete feedback.');
      loadFeedbacks();
    }catch(err){
      btn.disabled = false;
      note(feedbackNote, 'err', err.message || 'Could not delete feedback.');
    }
  });

  if(token()){
    showAdmin();
    dateFilter.value = today();
    loadBookings();
    loadFeedbacks();
  }else{
    showLogin();
  }
})();
</script>
</body>
</html>
